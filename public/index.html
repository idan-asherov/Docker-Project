<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management app</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <main>
        <section>
          <ul id="usersList"></ul>
        </section>
      </main>
      <header>
        <h1>User Management App</h1>
        <p>View our Dashboard, powered by ExpressJS and MongoDB</p>
      </header>

      <div class="stats" id="stat-card">
        <div class="total-users">0</div>
        <div class="label">Total Users</div>
      </div>

      <div class="stats" id="stat-card">
        <div class="number" id="average-age">0</div>
        <div class="label">Average Age</div>
      </div>

      <div class="stats" id="stat-card">
        <div class="number" id="deleted-users">0</div>
        <div class="label">Deleted Users</div>
      </div>
      <!--form to add new users-->
      <form id="addUserForm">
        <input type="text" id="name" placeholder="Enter Name" required />
        <input type="email" id="email" placeholder="Enter Email" required />
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          required
        />
        <input type="number" id="age" placeholder="Enter Age" required />
        <button type="submit">Add User</button>
      </form>
      <!--form to delete user-->
      <form id="deleteUserForm">
        <input type="text" id="userId" placeholder="Enter User ID" required />
        <button type="submit">Delete User</button>
      </form>
      <!--form to update user-->
      <form id="updateUserForm">
        <input type="text" id="userId" placeholder="Enter User ID" required />
        <input type="text" id="name" placeholder="Enter Name" required />
        <input type="email" id="email" placeholder="Enter Email" required />
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          required
        />
        <input type="number" id="age" placeholder="Enter Age" required />
        <button type="submit">Update User</button>
      </form>
      <div class="grid" id="usersGrid"></div>
      <!--innerHTML vs textContent Example-->
      <div id="output"></div>
    </div>
    <script src="api.js"></script>
  
    </script>
  </body>
</html>
